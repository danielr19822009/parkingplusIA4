<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Celdas - ParkingPlus IA4</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo">ParkingPlus IA4</a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Inicio</a></li>
                <li style="font-weight: 600; color: var(--primary);">Gestión de Celdas</li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 2.5rem; margin-bottom: 4rem;">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem;">
            <div>
                <h1 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 0.5rem;">Gestión de Celdas</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Administra las zonas y espacios del parqueadero.</p>
            </div>
            <button class="btn btn-primary" onclick="abrirModalCelda()">
                <i class="fas fa-plus-circle"></i> Nueva Celda
            </button>
        </header>

        <section class="card" style="padding: 0; overflow: hidden;">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Número de Celda</th>
                            <th>Tipo de Vehículo</th>
                            <th>Estado Actual</th>
                            <th style="text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaCeldas">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                <i class="fas fa-spinner fa-spin" style="margin-bottom: 1rem; font-size: 1.5rem;"></i><br>
                                Cargando celdas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal para crear/editar celda -->
    <div id="modalCelda" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">Crear Nueva Celda</h2>
            <form id="formCelda">
                <input type="hidden" id="celdaId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Número / Código</label>
                        <input type="text" id="celdaNumero" placeholder="Ej: C10, M02" required>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Piso</label>
                        <input type="number" id="celdaPiso" value="1" required min="1">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Tipo de Vehículo</label>
                    <select id="celdaTipo" required>
                        <option value="carro">Carro</option>
                        <option value="moto">Moto</option>
                        <option value="camioneta">Camioneta</option>
                    </select>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Estado</label>
                    <select id="celdaEstado" required>
                        <option value="disponible">Disponible</option>
                        <option value="ocupada">Ocupada</option>
                        <option value="mantenimiento">Mantenimiento</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="cerrarModalCelda()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Celda</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/celdas.js"></script>
</body>
</html>
