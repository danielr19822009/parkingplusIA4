<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ParkingPlus IA4</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-white);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .stat-card h4 { color: var(--text-muted); font-size: 0.9rem; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 160px;
            box-shadow: var(--shadow);
            z-index: 1;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }
        .dropdown-content a {
            color: var(--text-main);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
        }
        .dropdown-content a:hover { background-color: var(--bg-light); }
        .dropdown:hover .dropdown-content { display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo">ParkingPlus IA4</a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Inicio</a></li>
                <li class="dropdown">
                    <a href="#">Gestión <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i></a>
                    <div class="dropdown-content">
                        <a href="gestion-usuarios.html">Usuarios</a>
                        <a href="gestion-celdas.html">Celdas</a>
                        <a href="gestion-clientes.html">Clientes</a>
                        <a href="gestion-vehiculos.html">Vehículos</a>
                        <a href="gestion-reportes.html">Reportes</a>
                    </div>
                </li>
                <li><a href="pico-placa.html">Pico y Placa</a></li>
            </ul>
            <div class="dropdown">
                <button class="btn btn-outline" id="userName">Bienvenido: ... <i class="fas fa-user-circle"></i></button>
                <div class="dropdown-content">
                    <a href="perfil.html">Editar Perfil</a>
                    <a href="#" onclick="cambiarUsuario()">Cambiar Usuario</a>
                    <a href="#" onclick="cerrarSesion()" style="color: var(--danger);">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Panel de Control</h1>
            <button class="btn btn-primary" onclick="openModal('modalIngreso')">
                <i class="fas fa-plus"></i> Registrar Ingreso
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Vehículos Adentro</h4>
                <p id="statsDentro">0</p>
            </div>
            <div class="stat-card">
                <h4>Vehículos que Salieron</h4>
                <p id="statsFuera">0</p>
            </div>
        </div>

        <h2>Vehículos en Patio</h2>
        <div id="dashboardGrid" class="dashboard-grid">
            <!-- Tarjetas de vehículos se cargarán aquí -->
        </div>
    </main>

    <!-- Modal Registro Ingreso -->
    <div id="modalIngreso" class="modal">
        <div class="modal-content">
            <h2>Registrar Ingreso</h2>
            <form id="formIngreso" style="margin-top: 1rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label>Placa</label>
                        <input type="text" id="ingresoPlaca" required maxlength="8" oninput="this.value = this.value.toUpperCase()">
                    </div>
                    <div>
                        <label>Tipo</label>
                        <select id="ingresoTipo">
                            <option value="Carro">Carro</option>
                            <option value="Moto">Moto</option>
                        </select>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label>Marca</label>
                        <input type="text" id="ingresoMarca">
                    </div>
                    <div>
                        <label>Color</label>
                        <input type="text" id="ingresoColor">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Celda (Opcional - Id)</label>
                    <input type="number" id="ingresoCelda" value="1">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Registrar Entrada</button>
                    <button type="button" class="btn btn-outline" onclick="closeModal('modalIngreso')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Novedad -->
    <div id="modalNovedad" class="modal">
        <div class="modal-content">
            <h2>Registrar Novedad</h2>
            <p id="novedadPlaca" style="color: var(--text-muted); margin-bottom: 1rem;">Placa: ...</p>
            <textarea id="novedadInput" placeholder="Ej: Rayón en puerta derecha, vidrio abajo, etc..."
                style="width: 100%; height: 100px; padding: 10px; border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 1.5rem; resize: none;"></textarea>
            
            <input type="hidden" id="novedadRegistroId">
            
            <div style="display: flex; gap: 1rem;">
                <button onclick="guardarNovedad()" class="btn btn-primary" style="flex: 1;">Guardar Novedad</button>
                <button onclick="closeModal('modalNovedad')" class="btn btn-outline" style="flex: 1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script>
        // Lógica de sesión básica
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) window.location.href = 'login.html';
        document.getElementById('userName').innerHTML = `Bienvenido: ${usuario.nombre} <i class="fas fa-user-circle"></i>`;

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function cambiarUsuario() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
