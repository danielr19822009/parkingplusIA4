<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes - ParkingPlus IA4</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo">ParkingPlus IA4</a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Inicio</a></li>
                <li style="font-weight: 600; color: var(--primary);">Centro de Reportes</li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem; margin-bottom: 4rem;">
        <header style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; font-weight: 800;">Consultas y Reportes</h1>
            <p style="color: var(--text-muted);">Visualiza datos detallados del sistema.</p>
        </header>

        <!-- Botones de consulta -->
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2.5rem;">
            <button class="btn btn-primary" onclick="cargarReporteGral('vehiculos-resumen')">
                <i class="fas fa-car-side"></i> Vehículos Adentro/Afuera
            </button>
            <button class="btn btn-outline" onclick="cargarReporteGral('historial')">
                <i class="fas fa-history"></i> Historial Completo (Logs)
            </button>
            <button class="btn btn-outline" onclick="cargarReporteGral('usuarios')">
                <i class="fas fa-users-cog"></i> Usuarios y Roles
            </button>
            <button class="btn btn-outline" onclick="cargarReporteGral('vehiculos')">
                <i class="fas fa-car"></i> Parque Automotor
            </button>
            <button class="btn btn-outline" onclick="cargarReporteGral('celdas')">
                <i class="fas fa-th-large"></i> Celdas Actuales
            </button>
            <button class="btn btn-secondary" onclick="cargarIncidentes()">
                <i class="fas fa-exclamation-triangle"></i> Gestionar Incidentes
            </button>
        </div>

        <section class="card" style="padding: 1.5rem; overflow: hidden; min-height: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 id="reportTitle" style="margin: 0;">Seleccione un reporte para visualizar los datos...</h3>
                <div id="exportButtons" style="display: none; gap: 0.5rem;">
                    <button class="btn btn-outline" onclick="exportarExcel()" style="color: #1d6f42; border-color: #1d6f42;">
                        <i class="fas fa-file-excel"></i> Excel
                    </button>
                    <button class="btn btn-outline" onclick="exportarPDF()" style="color: #e74c3c; border-color: #e74c3c;">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                </div>
            </div>
            <div id="reportContent" class="table-container">
                <!-- Se poblará por JS -->
                 <p style="text-align: center; color: var(--text-muted); padding: 3rem;">
                    Haga clic en uno de los botones superiores para cargar la información.
                 </p>
            </div>
        </section>
    </main>

    <!-- Modal para incidentes (se reutiliza si es necesario) -->
    <div id="modalReporte" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Nuevo Incidente</h2>
            <form id="formReporte">
                <input type="hidden" id="reporteId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label>Tipo</label>
                        <select id="tipoReporte" required>
                            <option value="daño_fisico">Daño Físico</option>
                            <option value="mantenimiento">Mantenimiento</option>
                            <option value="seguridad">Seguridad</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label>Prioridad</label>
                        <select id="prioridadReporte">
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                            <option value="critica">Crítica</option>
                        </select>
                    </div>
                </div>
                <!-- ... otros campos ... -->
                <div style="margin-bottom: 1rem;">
                    <label>Descripción</label>
                    <textarea id="descripcionReporte" required style="width: 100%; height: 80px;"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" onclick="closeModal('modalReporte')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../js/reportes.js"></script>
    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
