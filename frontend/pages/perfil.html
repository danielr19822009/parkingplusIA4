<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - ParkingPlus IA4</title>
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="logo">ParkingPlus IA4</a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Inicio</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem;">
        <div class="tracking-container" style="margin: 0 auto; max-width: 600px;">
            <h1>Mi Perfil</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Edita la información de tu cuenta</p>

            <form id="perfilForm">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--bg-light); margin: 0 auto; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);">
                        <i class="fas fa-user fa-3x" style="color: var(--text-muted);"></i>
                    </div>
                    <button type="button" class="btn btn-outline" style="margin-top: 1rem; font-size: 0.8rem;">Cambiar Foto</button>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label>Nombre</label>
                        <input type="text" id="perfilNombre" readonly>
                    </div>
                    <div>
                        <label>Apellido</label>
                        <input type="text" id="perfilApellido" readonly>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <label>Correo Electrónico</label>
                    <input type="email" id="perfilCorreo" readonly>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar Cambios</button>
            </form>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('usuario'));
        if (user) {
            document.getElementById('perfilNombre').value = user.nombre || '';
            document.getElementById('perfilApellido').value = user.apellido || '';
        }
    </script>
</body>
</html>
